<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2052BB">
    <meta name="keywords"
    >
    <link href="/documents/finvis_html/base.css" rel="stylesheet" type="text/css"/>


</head>

<body>


<!--<div id="" class=" dark dark_light_bg">-->
<div id="" class=" ">

    <!--<div id="" class="">-->
    <div id="body">

        <div class="col-container">
            <div class="left-column">
                <div class="padding_wrapper">
                    <div class="drawer_container ratio_100" id="scatter_viz"></div>

                </div>
            </div>
            <div class="right-column">
                <div id="scatter_viz_sl0" class="slider_orange">
                    <div class="slider_text"><p>Scale</p></div>
                </div>
                <div id="scatter_viz_sl1" class="slider_blue">
                    <div class="slider_text"><p>&larr; Rate &rarr;</p></div>
                </div>
                <div id="scatter_viz_sl2" class="slider">
                    <div class="slider_text"><p>X-Axis Return Days</p></div>
                </div>
                <div id="scatter_viz_sl3" class="slider">
                    <div class="slider_text"><p>Y-Axis Return Days</p></div>
                </div>
                <div class="slider_text"><p>Color by</p></div>

                <div class="lns_segmented" id="scatter_viz_seg0">


                </div>
                <div class="slider_text"><p>Size by</p></div>

                <div class="lns_segmented" id="scatter_viz_seg1">
                </div>

                <div class="toggleList">
                    <div class="toggle-container">

                        <label class="toggle-toggle-switch">

                            <input type="checkbox" id="tog1">

                            <span class="toggle-slider round"></span>
                        </label>
                        <span class="toggle-label">Log Marker Size</span>

                    </div>
                    <div class="toggle-container">

                        <label class="toggle-toggle-switch">

                            <input type="checkbox" id="tog2">
                            <span class="toggle-slider round"></span>
                        </label>
                        <span class="toggle-label">Labels</span>

                    </div>

                    <div class="toggle-container">

                        <label class="toggle-toggle-switch ">

                            <!--                        <input type="checkbox" id="tog3" >-->
                            <input type="checkbox" id="tog3" checked>
                            <span class="toggle-slider round"></span>
                        </label>
                        <span class="toggle-label">Tracks</span>

                    </div>
                </div>
            </div>
        </div>


    </div>
</div>

<script src="/documents/finvis_html/base.js"></script>

<script src="/documents/finvis_html/fin.js"></script>
</body>

</html>
