<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>System</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Local fonts -->
  <!-- Import the shared CSS files (after Bootstrap for overrides) -->
  <link rel="stylesheet" type="text/css" href="/static/base.css">
  <link rel="stylesheet" type="text/css" href="/static/base_extra.css">
  <link rel="stylesheet" type="text/css" href="/static/dashboard.css">
  <!-- Bootstrap 5 JS Bundle (includes Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- html2canvas for window screenshots -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <!-- Import your custom JS file (base.js) -->
  <script src="/static/base.js"></script>
</head>
<body>
  <!-- Main Container -->
  <div class="container-fluid">

    <!-- Header Row -->
    <div class="row">
      <div class="col-12">
        <div class="d-flex align-items-center" id="site_header_row">
          <div class="card" id="site_title_card">
            <div class="card-header">
              <h1 id="site_title">Lilac Systems</h1>
            </div>
          </div>
          <div class="d-flex align-items-center ms-auto" id="site_header_buttons">
            <div class="d-flex align-items-center me-4">
              <div class="btn-group btn-group-sm me-2" role="group" id="panel_visibility_toggle">
                <button class="btn btn-outline-secondary" id="hide_all_panels">Hide All</button>
                <button class="btn btn-outline-secondary" id="show_all_panels">Show All</button>
              </div>
              <div class="btn-group btn-group-sm me-2" role="group" id="col_count_toggle">
                <button class="btn btn-outline-secondary" id="col_decrease">−</button>
                <span class="btn btn-outline-secondary disabled" id="col_count_display" style="min-width:28px; pointer-events:none;">3</span>
                <button class="btn btn-outline-secondary" id="col_increase">+</button>
              </div>
              <div class="btn-group btn-group-sm me-2" role="group" id="font_size_toggle">
                <button class="btn btn-outline-secondary" id="font_decrease">A−</button>
                <button class="btn btn-outline-secondary" id="font_increase">A+</button>
              </div>
              <button class="btn btn-sm btn-outline-secondary me-1" id="mute_alarm_toggle" title="Mute interlock alarm"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></button>
              <button class="btn btn-sm btn-outline-secondary me-1" id="dark_mode_toggle" title="Toggle dark mode">&#9789;</button>
            </div>
            <div class="d-flex align-items-center">
              <span id="header_clock"></span><span id="clock_pulse" class="me-2"></span>
              <button class="btn btn-sm btn-outline-secondary" id="save_point_btn" title="Save current readings to pts.csv">Save Pnt</button><span class="save-point-counter" id="save_point_count">0</span>
              <button class="btn btn-sm btn-outline-secondary ms-1" id="save_figure_btn" title="Save figure &amp; screenshot">Save Fig</button>
              <button class="btn btn-sm btn-outline-danger ms-1" id="stop_btn" title="Save figure, finalize CSV &amp; stop">Stop</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 3-Column Masonry Layout -->
    <div class="dashboard-columns">

      <!-- Column 1 (Left) -->
      <div class="dashboard-col" id="col_left">
        {% for sc in scatter_plots %}
        <div class="draggable-panel" draggable="true" data-panel-id="animated_scatter_{{ loop.index0 }}">
          <div class="card">
            <div class="card-header">
              <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0">{{ sc.y }} vs {{ sc.x }}</h5>
                <div class="d-flex align-items-center">
                  <div class="btn-group btn-group-sm me-2" role="group">
                    <input type="radio" class="btn-check" name="anim_scatter_option_{{ loop.index0 }}" id="anim_scatter_30min_{{ loop.index0 }}" value="30min" autocomplete="off">
                    <label class="btn btn-outline-secondary" for="anim_scatter_30min_{{ loop.index0 }}">30min</label>
                    <input type="radio" class="btn-check" name="anim_scatter_option_{{ loop.index0 }}" id="anim_scatter_1min_{{ loop.index0 }}" value="1min" autocomplete="off" checked>
                    <label class="btn btn-outline-secondary" for="anim_scatter_1min_{{ loop.index0 }}">1min</label>
                  </div>
                  <button class="btn btn-sm btn-outline-secondary toggle-panel" data-target="animated_scatter_body_{{ loop.index0 }}">
                    <span class="toggle-icon">−</span>
                  </button>
                </div>
              </div>
            </div>
            <div class="card-body panel-body-collapsible" id="animated_scatter_body_{{ loop.index0 }}">
              <canvas id="animated_scatter_canvas_{{ loop.index0 }}" style="width:100%; aspect-ratio:1/1;"></canvas>
            </div>
          </div>
        </div>
        {% endfor %}
      </div>

      <!-- Column 2 (Middle): Plots -->
      <div class="dashboard-col" id="col_middle">
        <div class="draggable-panel" draggable="true" data-panel-id="animated_ts">
          <div class="card">
            <div class="card-header">
              <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Time Series</h5>
                <div class="d-flex align-items-center">
                  <button class="btn btn-sm btn-outline-secondary me-2" id="clear_ts_btn">Clear</button>
                  <div class="btn-group btn-group-sm me-2" role="group" id="anim_ts_toggle">
                    <input type="radio" class="btn-check" name="anim_ts_option" id="anim_ts_30min" value="30min" autocomplete="off">
                    <label class="btn btn-outline-secondary" for="anim_ts_30min">30min</label>
                    <input type="radio" class="btn-check" name="anim_ts_option" id="anim_ts_1min" value="1min" autocomplete="off" checked>
                    <label class="btn btn-outline-secondary" for="anim_ts_1min">1min</label>
                  </div>
                  <button class="btn btn-sm btn-outline-secondary toggle-panel" data-target="animated_ts_body">
                    <span class="toggle-icon">−</span>
                  </button>
                </div>
              </div>
            </div>
            <div class="card-body panel-body-collapsible" id="animated_ts_body">
              <canvas id="animated_ts_canvas" style="width:100%; height:720px;"></canvas>
            </div>
          </div>
        </div>

        <div class="draggable-panel" draggable="true" data-panel-id="legend">
          <div class="card">
            <div class="card-header">
              <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Plot Legend</h5>
                <button class="btn btn-sm btn-outline-secondary toggle-panel" data-target="legend_body">
                  <span class="toggle-icon">−</span>
                </button>
              </div>
            </div>
            <div class="card-body panel-body-collapsible" id="legend_body">
              <div class="table-responsive">
                <table class="table table-sm custom-table" id="legend_table">
                  <thead>
                    <tr><th>Series</th><th>Unit</th><th>Value</th></tr>
                  </thead>
                  <tbody id="legend_table_body"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Column 3 (Right): Controls and Instruments -->
      <div class="dashboard-col" id="col_right">
        <div class="draggable-panel" draggable="true" data-panel-id="pid_loops">
          <div class="card">
            <div class="card-header">
              <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Control</h5>
                <button class="btn btn-sm btn-outline-secondary toggle-panel" data-target="pid_loops_body">
                  <span class="toggle-icon">&minus;</span>
                </button>
              </div>
            </div>
            <div class="card-body panel-body-collapsible" id="pid_loops_body">
              <div id="step_series_container"></div>
              <div id="pid_loops_container"></div>
              <div id="output_controls_container"></div>
            </div>
          </div>
        </div>

        <div class="draggable-panel" draggable="true" data-panel-id="controls">
          <div class="card">
            <div class="card-header">
              <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Config</h5>
                <button class="btn btn-sm btn-outline-secondary toggle-panel" data-target="controls_body">
                  <span class="toggle-icon">−</span>
                </button>
              </div>
            </div>
            <div class="card-body panel-body-collapsible" id="controls_body">
              <div id="controls">
                <!-- Controls will be dynamically inserted here -->
              </div>
            </div>
          </div>
        </div>

        <div class="draggable-panel" draggable="true" data-panel-id="interlocks">
          <div class="card">
            <div class="card-header">
              <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Interlocks</h5>
                <button class="btn btn-sm btn-outline-secondary toggle-panel" data-target="interlocks_body">
                  <span class="toggle-icon">&minus;</span>
                </button>
              </div>
            </div>
            <div class="card-body panel-body-collapsible" id="interlocks_body">
              <div id="interlocks_container"></div>
            </div>
          </div>
        </div>

        <div class="draggable-panel" draggable="true" data-panel-id="driver_status">
          <div class="card">
            <div class="card-header">
              <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Driver Status</h5>
                <button class="btn btn-sm btn-outline-secondary toggle-panel" data-target="driver_status_body">
                  <span class="toggle-icon">&minus;</span>
                </button>
              </div>
            </div>
            <div class="card-body panel-body-collapsible" id="driver_status_body">
              <div id="driver_status_container"></div>
            </div>
          </div>
        </div>

        <div class="draggable-panel" draggable="true" data-panel-id="instruments">
          <div class="card">
            <div class="card-header">
              <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Instruments</h5>
                <button class="btn btn-sm btn-outline-secondary toggle-panel" data-target="instruments_body">
                  <span class="toggle-icon">−</span>
                </button>
              </div>
            </div>
            <div class="card-body panel-body-collapsible" id="instruments_body">
              <div class="table-responsive">
                <table class="table custom-table" id="sensor_table">
                  <thead>
                    <tr>
                      <th>Key</th>
                      <th>Unit</th>
                      <th>Value</th>
                      <th style="width: 40px;">✓</th>
                    </tr>
                  </thead>
                  <tbody id="sensor_table_body"></tbody>
                  <tbody><tr class="table-separator"><td colspan="4"></td></tr></tbody>
                  <tbody id="command_actual"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- Footer Row -->
    <div class="row">
      <div class="col-12">
        <footer id="footer" class="text-start py-3" style="color: var(--text-muted)">
          <small>Lilac Systems &nbsp; <span id="screen_hz" title="Screen refresh rate">-- Hz</span> &nbsp; <span id="instrument_hz" title="Instrument poll rate">-- Hz</span></small>
        </footer>
      </div>
    </div>

  </div> <!-- End container-fluid -->

  <script>
    const sensorUnits = {{ sensor_units | tojson }};
    const SCATTER_CONFIGS = {{ scatter_plots | tojson }};
  </script>
  <script src="/static/experiment.js"></script>
  <script src="/static/dashboard.js"></script>
</body>
</html>
