<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sensor Dashboard</title>
  <!-- Import the shared CSS files -->
  <link rel="stylesheet" type="text/css" href="/static/base.css">
  <link rel="stylesheet" type="text/css" href="/static/base_extra.css">
  <!-- uPlot CSS for the lightweight plot -->
  <link rel="stylesheet" href="https://unpkg.com/uplot/dist/uPlot.min.css">
  <!-- Import your custom JS file (base.js) -->
  <script src="/static/base.js"></script>
  <!-- uPlot library -->
  <script src="https://unpkg.com/uplot/dist/uPlot.iife.min.js"></script>

</head>
<body>
  <div id="main_container">
    <!-- Header Panel -->
    <header class="panel">
      <h1 id="site_title">Lilac Box</h1>
    </header>

    <!-- Sensor Readings Panel -->
    <section id="sensor_display" class="panel">
      <h2>Instruments</h2>
      <table id="sensor_table">
        <thead>
          <tr><th>Key</th><th>Value</th></tr>
        </thead>
        <tbody id="sensor_table_body"></tbody>
        <tr><th></th><th></th></tr>
        <tbody id="command_actual"></tbody>

      </table>
    </section>
    

    <!-- Control Panel (with integrated server‐control indicators) -->
    <section id="controls" class="panel">
      <h2 class="" style="">Controls</h2>
      <p style=""></p>
      
    </section>


    <!-- Plot Panel -->
    <section id="plot_section" class="panel panel-plot">
      <h2>Data Plot</h2>
      <div id="plot_toggle">
        <label>
          <input type="radio" name="plot_option" value="all" > All Data (subsampled)
        </label>
        <label>
          <input type="radio" name="plot_option" value="1min" checked> Last 1 Minute
        </label>
      </div>

      <div style="display: flex; justify-content: space-between;" >
        <div id="plot_div" style="width: 70%; height: 400px;"></div>
        <div id="legend_div" style="width: 28%; height: 400px; overflow-y: auto;">
          <table id="legend_table">
            <thead>
              <tr><th>Series</th><th>Value</th></tr>
            </thead>
            <tbody id="legend_table_body"></tbody>
          </table>
        </div>
      </div>
      
    </section>

    <!-- Footer Panel -->
    <footer id="footer" class="panel">
    </footer>
  </div>

  <script>
    "use strict";
    // Global parameter for number formatting
    const DECIMAL_POINTS = 2;
    // Global variable to hold the latest sensor data (from the /data endpoint)
    let sensorData = {};

    // Set up the uPlot chart for environment data
    let plotData = [[], [], [], [], []]; // [timestamps, cpu_temp, ambient_temp, humidity, pressure]
    let uPlotChart;
    const plotOpts = {
      title: "Set 1",
      width: document.getElementById("plot_div").clientWidth,
      height: 400,
      scales: { x: { time: true }, y: {} },
      series: [
      {},
      { label: "CPU Temp (°C)", stroke: "red", value: (u, v) => v == null ? "-" : v.toFixed(DECIMAL_POINTS) },
      { label: "Ambient Temp (°C)", stroke: "blue", value: (u, v) => v == null ? "-" : v.toFixed(DECIMAL_POINTS) },
      { label: "Humidity (%)", stroke: "green", value: (u, v) => v == null ? "-" : v.toFixed(DECIMAL_POINTS) },
      { label: "Pressure (hPa)", stroke: "orange", value: (u, v) => v == null ? "-" : v.toFixed(DECIMAL_POINTS) }
      ]
    };
    

    uPlotChart = new uPlot(plotOpts, plotData, document.getElementById("plot_div"));

    // Helper: return plot data based on toggle option
    function getPlotData() {
      const mode = document.querySelector('input[name="plot_option"]:checked').value;
      const now = Date.now() / 1000;
      if (mode === "1min") {
        const newData = [[], [], [], [], []];
        for (let i = 0; i < plotData[0].length; i++) {
          if (plotData[0][i] >= (now - 60)) {
            newData[0].push(plotData[0][i]);
            newData[1].push(plotData[1][i]);
            newData[2].push(plotData[2][i]);
            newData[3].push(plotData[3][i]);
            newData[4].push(plotData[4][i]);
          }
        }
        return newData;
      } else {
        const maxPoints = 200;
        const len = plotData[0].length;
        if (len <= maxPoints) return plotData;
        const newData = [[], [], [], [], []];
        const step = len / maxPoints;
        for (let i = 0; i < maxPoints; i++) {
          const idx = Math.floor(i * step);
          newData[0].push(plotData[0][idx]);
          newData[1].push(plotData[1][idx]);
          newData[2].push(plotData[2][idx]);
          newData[3].push(plotData[3][idx]);
          newData[4].push(plotData[4][idx]);
        }
        return newData;
      }
    }

    function updatePlot() {
      uPlotChart.setData(getPlotData());
      updateLegend();
    }

    function updateLegend() {
      const legendBody = document.getElementById("legend_table_body");
      legendBody.innerHTML = "";
      const latestData = plotData.map(series => series[series.length - 1]);
      plotOpts.series.forEach((s, idx) => {
        if (idx === 0) return; // Skip the x-axis series
        legendBody.innerHTML += `<tr><td>${s.label}</td><td>${latestData[idx].toFixed(DECIMAL_POINTS)}</td></tr>`;
      });
    }

    // Format numeric values using DECIMAL_POINTS
    function formatValue(value) {
      if (typeof value === "number") {
        return value.toFixed(DECIMAL_POINTS);
      }
      return value;
    }

    // Update the sensor readings table
    function updateDataTables(data) {
      const tbody = document.getElementById("sensor_table_body");
      tbody.innerHTML = "";
      for (const key in data.sensors) {
        let value = data.sensors[key];
        if (typeof value === "number") {
          value = formatValue(value);
        } else if (typeof value === "object" && value !== null) {
          value = JSON.stringify(value, (k, v) =>
            typeof v === "number" ? parseFloat(v.toFixed(DECIMAL_POINTS)) : v
          );
        }
        tbody.innerHTML += `<tr><td>${key}</td><td>${value}</td></tr>`;
      }
      command_actual
      const tbody2 = document.getElementById("command_actual");
      tbody2.innerHTML = "";
      for (const key in data.controls) {
        let value = data.controls[key];
        if (typeof value === "number") {
          value = formatValue(value);
        } else if (typeof value === "object" && value !== null) {
          value = JSON.stringify(value, (k, v) =>
            typeof v === "number" ? parseFloat(v.toFixed(DECIMAL_POINTS)) : v
          );
        }
        tbody2.innerHTML += `<tr><td>${key}</td><td>${value}</td></tr>`;
      }
    }



    // This function is called whenever any control is updated.
    function updateControl(key, value) {
      const commandData = {};
      commandData[key] = value;
      fetch('/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(commandData)
      })
      .then(response => response.json())
      .then(data => {
        // console.log("Control update response:", data);
        // Update the indicator dot next to the control.
        const indicator = document.getElementById("controls_" + key + "_indicator");
        if (indicator) {
          indicator.innerHTML = (data.controls[key] == value)
            ? '<span class="indicator-dot match"></span>'
            : '<span class="indicator-dot mismatch"></span>';
        }
      })
      .catch(err => console.error("Error updating control:", err));
    }
        

    
    const controlConfig = {
      sliders: [
        { key: "slider1", label: "Slider1", defaultValue: 0.5, stylePrefix: "" },
        { key: "slider2", label: "Slider2", defaultValue: 0.5, stylePrefix: "" },
        { key: "slider3", label: "Slider3", defaultValue: 0.5, stylePrefix: "" }

      ],
      segments: [
        { key: "selector1", label: "Selector", options: ["option1", "option2", "option3"], defaultValue: 1 },
        { key: "selector2", label: "Selector", options: ["option1", "option2", "option3"], defaultValue: 2 },
        { key: "selector3", label: "Selector", options: ["option1", "option2", "option3"], defaultValue: 0 },


      ],
      textInputs: [
        { key: "input2", label: "Input Value2 aaaaaaaaaa", defaultValue: 2 },
        { key: "input3", label: "Input Value", defaultValue:2},

        { key: "log_filename", label: "Log Filename", defaultValue: "junk.csv" }
      ],
      checkboxes: [
        { key: "append", label: "Append to file", defaultValue: false }
      ]
    };


    // Create the control panel inside the element with ID "controls"
    const controls = makeControlPanel("controls", controlConfig);

    // Fetch sensor data every 0.1 s and update everything
    function fetchSensorData() {
      fetch('/data')
        .then(response => response.json())
        .then(data => {
          sensorData = data;
          sendCommandDynamic(controls, updateControl);
          updateDataTables(data);
          updateControlIndicatorsDynamic(controls, sensorData.controls, "controls");
 

          const nowSec = Date.now() / 1000.0;
          plotData[0].push(nowSec);
          plotData[1].push(parseFloat(data.sensors.cpu_temp));
          plotData[2].push(parseFloat(data.sensors.ambient_temp));
          plotData[3].push(parseFloat(data.sensors.humidity));
          plotData[4].push(parseFloat(data.sensors.pressure));
          updatePlot();
        })
        .catch(err => console.error('Error fetching sensor data:', err));
    }
    setInterval(fetchSensorData,100);
    fetchSensorData();
    
    // Update the plot when the toggle changes
    document.querySelectorAll('input[name="plot_option"]').forEach(radio => {
      radio.addEventListener('change', updatePlot);
    });
    
    // Adjust plot size on window resize
    window.addEventListener('resize', function() {
      uPlotChart.setSize({ width: document.getElementById("plot_div").clientWidth, height: 400 });
    });
    
  
  
    
  </script>
</body>
</html>
